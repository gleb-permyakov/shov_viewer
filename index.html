<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотрщик с рисованием</title>
    <link rel="stylesheet" href="./style.css">    
</head>
<body >
    <div class="viewer">
        <div class="tools">
            <div class="tools-back">
                <input type="file" id="fileInput" class="file-input" accept="image/*">
                <label for="fileInput" class="tool-btn">Загрузить изображение</label>
                <div class="tool-panel">
                    <label for="etalonValue" class="tool-label">Эталон:</label>
                    <select id="etalonValue" class="tool-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <button class="tool-btn" data-tool="line_etalon">Эталонная линия</button>
                <button class="tool-btn active" data-tool="line">Линия</button>
                <button class="tool-btn" data-tool="rectangle">Прямоугольник</button>
                <button class="tool-btn" data-tool="ellipse">Эллипс</button>
                <button class="tool-btn" data-tool="ellipse3">Эллипс 3</button>
                <button class="tool-btn find_shov" data-tool="find_shov">Шов</button>
                <button class="tool-btn delete_shov" data-tool="find_shov">Удалить шов</button>
                <!-- <button class="tool-btn inDev" data-tool="text">Текст</button> -->
                <button class="tool-btn" data-tool="ruler">Линейка</button>
                <button class="tool-btn" data-tool="measureRect">Измерительный прямоугольник</button>
                <button class="tool-btn" data-tool="measureEllipse">Измерительный элипс</button>
                <button class="tool-btn" data-tool="measureEllipse3">Измерительный элипс 3</button>

                <div>
                    <input type="color" id="colorPicker" class="color-picker" value="#ff0000">
                    
                    <input type="range" id="sizeSlider" class="size-slider" min="1" max="20" value="3">
                    <span id="sizeValue">3px</span>
                </div>
                <button class="tool-btn" id="deleteBtn">Удалить</button>
                <button class="tool-btn" id="clearBtn">Очистить</button>
                <button class="tool-btn" id="saveBtn">Сохранить</button>
                
                <button class="tool-btn" id="zoomIn">+</button>
                <button class="tool-btn" id="zoomOut">-</button>
                <button class="tool-btn" id="resetZoom">100%</button>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="info">
            <div id="status">Загрузите изображение или начните рисовать</div>
        </div>
    </div>

    <!-- JS scripts -->
    <script src="interface.js" defer></script>
    <!-- JS figures -->
     <script src="./figures/measureRect.js" defer></script>
    <script src="./figures/line.js" defer></script>
    <script src="./figures/ruler.js" defer></script>
    <script src="./figures/line_etalon.js" defer></script>
    <script src="./figures/rectangle.js" defer></script>
    <script src="./figures/ellipse.js" defer></script>
    <script src="./figures/ellipse3.js" defer></script>
    <script src="./figures/measureEllipse.js" defer></script>
    <script src="./figures/measureEllipse3.js" defer></script>
    <script src="./figures/shov.js" defer></script>
    <!-- JS main -->
    <script src="index.js" defer></script>
    <!-- поисковик шва -->
    <script src="shov_finder.js" defer></script>
    <!-- сохранение аннотаций -->
    <script src="annotation.js"></script>
    
</body>
</html>
